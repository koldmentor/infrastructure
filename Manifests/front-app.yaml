# =============================================================================
# Front App - Ruta de la Confianza
# =============================================================================
# Banco: grupo1a | Namespace: grupo1a-ms
# =============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-app
  namespace: grupo1a-ms
  labels:
    app: front-app
    bank: grupo1a
    managed-by: kubectl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: front-app
  template:
    metadata:
      labels:
        app: front-app
        bank: grupo1a
        managed-by: kubectl
    spec:
      containers:
        - name: front-app
          image: 200283853536.dkr.ecr.us-east-1.amazonaws.com/front-app:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: front-app
  namespace: grupo1a-ms
  labels:
    app: front-app
    bank: grupo1a
    managed-by: kubectl
spec:
  type: ClusterIP
  selector:
    app: front-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: front-app
  namespace: grupo1a-ms
  labels:
    app: front-app
    bank: grupo1a
    managed-by: kubectl
  annotations:
    alb.ingress.kubernetes.io/group.name: grupo1a-shared-alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/tags: Project=Diplomado,Bank=grupo1a,ManagedBy=kubectl
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-app
                port:
                  number: 80
